# Central path configuration for NIBS processing pipelines.
#
# Local-filesystem setup. Every value below is an ABSOLUTE path; config.py joins
# each against project_root, but os.path.join() returns an absolute second
# argument unchanged, so project_root is effectively ignored here. This keeps the
# raw BIDS dataset, the derivatives, and the working directories on independent
# roots.
project_root: /mnt/c/Users/tsalo/Documents/datasets/nibs

# Raw BIDS dataset (contains sub-*/ directly).
bids_dir: /mnt/c/Users/tsalo/Documents/datasets/nibs
# Repository checkout holding this code (configuration/, processing/, ...).
code_dir: /mnt/c/Users/tsalo/Documents/linc/nibs
# Scratch/working directory for intermediate files (SEPIA + chi-sep inputs/outputs).
work_dir: /mnt/c/Users/tsalo/Documents/datasets/nibs-work

sourcedata:
  root: /mnt/c/Users/tsalo/Documents/datasets/nibs/sourcedata
  scitran: /mnt/c/Users/tsalo/Documents/datasets/nibs/sourcedata/scitran/bbl/NIBS_857664

derivatives:
  smriprep: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/smriprep
  pymp2rage: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/pymp2rage
  ihmt: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/ihmt
  mese: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/mese
  megre: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/megre
  qsm: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/qsm
  t1wt2w_ratio: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/t1wt2w_ratio
  g_ratio: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/g_ratio
  myelin: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/myelin
  qsiprep: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/qsiprep
  qsirecon_dipydki: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/qsirecon/derivatives/qsirecon-DIPYDKI
  qsirecon_noddi: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/qsirecon/derivatives/qsirecon-NODDI
  qsirecon_dsistudio: /mnt/c/Users/tsalo/Documents/datasets/nibs/derivatives/qsirecon/derivatives/qsirecon-DSIStudio

